spring.application.name=backend
spring.profiles.active=local

spring.datasource.url=jdbc:mysql://localhost:3306/shi_gui?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0

sa-token.token-name=satoken
sa-token.timeout=604800
sa-token.is-read-body=false

ai.match.enabled=true
# DeepSeek API (OpenAI-compatible), 敏感值在 application-local.properties
ai.match.base-url=${AI_MATCH_BASE_URL:https://api.deepseek.com}
ai.match.api-key=${AI_MATCH_API_KEY:}
ai.match.model=${AI_MATCH_MODEL:deepseek-v4-flash}
ai.match.timeout-seconds=30
ai.match.include-private-feature=true
ai.match.max-candidates=20
ai.match.max-results=5
ai.match.threshold=0.70
